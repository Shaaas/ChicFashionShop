<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIC | The Art of Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --dark: #0a0a0a;
            --accent: #8e8e8e;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            background: var(--bg); 
            color: var(--dark); 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo { font-family: 'Italiana', serif; font-size: 1.8rem; letter-spacing: 5px; font-weight: 900; }
        .nav-links a { text-decoration: none; color: var(--dark); font-size: 0.7rem; letter-spacing: 2px; margin-left: 30px; text-transform: uppercase; cursor: pointer; }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5%;
            background: #f9f9f9;
        }

        .hero-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 80px; align-items: center; }
        .hero-image {
            width: 100%;
            height: 80vh;
            background: url('https://images.unsplash.com/photo-1539109132314-347f85417bd0?q=80&w=1974&auto=format&fit=crop') center/cover;
            filter: grayscale(100%);
            transition: 1s ease;
        }
        .hero-image:hover { filter: grayscale(0%); }
        .hero-text h1 { font-family: 'Italiana', serif; font-size: clamp(4rem, 10vw, 8rem); line-height: 0.9; margin-bottom: 20px; }

        /* Horizontal Lookbook */
        .lookbook-wrapper { height: 350vh; background: var(--dark); color: white; position: relative; }
        .lookbook-sticky { position: sticky; top: 0; height: 100vh; overflow: hidden; display: flex; align-items: center; }
        .lookbook-track { display: flex; will-change: transform; transition: transform 0.1s linear; }
        .lookbook-slide { flex-shrink: 0; width: 80vw; height: 70vh; margin-right: 20vw; display: flex; align-items: center; justify-content: center; }
        .lookbook-slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .slide-title { font-family: 'Italiana', serif; font-size: 6vw; text-align: center; line-height: 1; }

        /* Collection Grid */
        .collection { padding: 120px 5%; background: white; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 60px; }
        .product-card { position: relative; margin-bottom: 40px; }
        .product-card img { width: 100%; height: 550px; object-fit: cover; transition: 0.6s; }
        .product-card:hover img { filter: brightness(0.85); }
        .product-info { margin-top: 20px; display: flex; justify-content: space-between; font-size: 0.8rem; letter-spacing: 1px; }

        /* Cart Drawer */
        .cart-drawer {
            position: fixed; right: -450px; top: 0; width: 400px; height: 100%;
            background: white; z-index: 3000; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 40px; box-shadow: -10px 0 50px rgba(0,0,0,0.1);
        }
        .cart-drawer.active { right: 0; }
        .checkout-btn { width: 100%; padding: 20px; background: var(--dark); color: white; border: none; margin-top: 30px; letter-spacing: 2px; }

        /* Search Overlay */
        .search-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); backdrop-filter: blur(20px);
            z-index: 4000; display: none; align-items: center; justify-content: center;
        }
        .search-overlay.active { display: flex; }
        #search-input { width: 80%; border: none; border-bottom: 2px solid #000; font-family: 'Italiana', serif; font-size: 4rem; text-align: center; outline: none; }

        /* Utility */
        .reveal { opacity: 0; transform: translateY(40px); transition: 1.2s; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .add-btn { background: none; border: 1px solid #000; padding: 10px 20px; cursor: pointer; font-size: 0.6rem; letter-spacing: 2px; margin-top: 15px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CHIC</div>
        <div class="nav-links">
            <a onclick="toggleSearch()">Search</a>
            <a href="#collection">Collection</a>
            <a onclick="toggleCart()" id="cart-nav">Cart (0)</a>
        </div>
    </nav>

    <div id="search-overlay" class="search-overlay">
        <button onclick="toggleSearch()" style="position:absolute; top:40px; right:5%; background:none; border:none; font-size:2rem; cursor:pointer;">✕</button>
        <input type="text" id="search-input" placeholder="Type to explore...">
    </div>

    <div id="cart-drawer" class="cart-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:20px;">
            <span class="logo" style="font-size:1rem;">Your Selection</span>
            <button onclick="toggleCart()" style="background:none; border:none; cursor:pointer;">CLOSE</button>
        </div>
        <div id="cart-items" style="margin-top:30px;">Your wardrobe is empty.</div>
        <div style="position:absolute; bottom:40px; width:320px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <span>Subtotal</span>
                <span id="total">$0</span>
            </div>
            <button class="checkout-btn">PROCEED TO CHECKOUT</button>
        </div>
    </div>

    <section class="hero">
        <div class="hero-grid">
            <div class="hero-text">
                <p style="letter-spacing:5px; font-size:0.7rem; margin-bottom:10px;">L'ART DE VIVRE</p>
                <h1>Timeless<br>Sculpture</h1>
                <p style="color:var(--accent); max-width:350px; margin-top:20px;">Architecture for the human form. Discover the 2026 High Summer Collection.</p>
            </div>
            <div class="hero-image"></div>
        </div>
    </section>

    <section class="lookbook-wrapper" id="lookbook">
        <div class="lookbook-sticky">
            <div class="lookbook-track" id="lookbook-track">
                <div class="lookbook-slide">
                    <h2 class="slide-title">THE<br>ART OF<br>SILENCE</h2>
                </div>
                <div class="lookbook-slide">
                    <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1920&auto=format&fit=crop">
                </div>
                <div class="lookbook-slide">
                    <img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?q=80&w=1974&auto=format&fit=crop">
                </div>
            </div>
        </div>
    </section>

    <section class="collection" id="collection">
        <div class="product-grid">
            <div class="product-card reveal">
                <img src="https://images.unsplash.com/photo-1539109132314-347f85417bd0?q=80&w=1974&auto=format&fit=crop">
                <div class="product-info">
                    <span>Sculpted Blazer / Ivory</span>
                    <span>$420</span>
                </div>
                <button class="add-btn" onclick="addToCart('Sculpted Blazer', 420)">Add to Selection</button>
            </div>
            <div class="product-card reveal" style="margin-top:80px;">
                <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070&auto=format&fit=crop">
                <div class="product-info">
                    <span>Onyx Silk Set</span>
                    <span>$650</span>
                </div>
                <button class="add-btn" onclick="addToCart('Onyx Silk Set', 650)">Add to Selection</button>
            </div>
        </div>
    </section>

    <script>
        // Cart Logic
        let cart = [];
        let total = 0;
        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('active'); }
        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            updateCart();
            if(!document.getElementById('cart-drawer').classList.contains('active')) toggleCart();
        }
        function updateCart() {
            const items = document.getElementById('cart-items');
            document.getElementById('cart-nav').innerText = `Cart (${cart.length})`;
            document.getElementById('total').innerText = `$${total}`;
            items.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:0.8rem;"><span>${i.name}</span><span>$${i.price}</span></div>`).join('');
        }

        // Search Logic
        function toggleSearch() { document.getElementById('search-overlay').classList.toggle('active'); }

        // Lookbook Horizontal Scroll
        window.addEventListener('scroll', () => {
            const lookbook = document.getElementById('lookbook');
            const track = document.getElementById('lookbook-track');
            const offset = window.pageYOffset - lookbook.offsetTop;
            const scrollDist = lookbook.offsetHeight - window.innerHeight;
            
            if (offset >= 0 && offset <= scrollDist) {
                const move = (offset / scrollDist) * 75; // Travel distance
                track.style.transform = `translateX(-${move}%)`;
            }

            // Scroll Reveals
            document.querySelectorAll('.reveal').forEach(el => {
                if(el.getBoundingClientRect().top < window.innerHeight - 100) el.classList.add('active');
            });
        });
    </script>
</body>
</html>
