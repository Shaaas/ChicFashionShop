<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIC | The Obsidian Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Montserrat:wght@100;300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #d4af37;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; cursor: crosshair; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. Atmospheric Glow - Inspired by PENUBA */
        .ambient-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.07) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
            filter: blur(120px);
        }

        /* 2. Kinetic Watermark - Inspired by LIFTED */
        .bg-watermark {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Italiana', serif;
            font-size: 38vw;
            color: rgba(255,255,255,0.02);
            z-index: -1;
            white-space: nowrap;
            pointer-events: none;
            letter-spacing: -2vw;
            transition: 0.2s ease-out;
        }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%;
            padding: 40px 8%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(5,5,5,1), transparent);
        }

        .logo { font-family: 'Italiana', serif; font-size: 2.2rem; letter-spacing: 10px; font-weight: 900; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 0.65rem; letter-spacing: 4px; margin-left: 40px; text-transform: uppercase; opacity: 0.5; transition: 0.4s; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            align-items: center;
            padding: 0 10%;
            position: relative;
        }

        .hero-text { z-index: 10; }
        .hero-text h1 {
            font-family: 'Italiana', serif;
            font-size: clamp(4rem, 12vw, 10rem);
            line-height: 0.75;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .hero-img-container {
            position: relative;
            z-index: 5;
        }

        .hero-img-container img {
            width: 100%;
            height: 75vh;
            object-fit: cover;
            filter: contrast(1.1) brightness(0.8) grayscale(20%);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* The "Contra" Floating Badge */
        .floating-badge {
            position: absolute;
            bottom: 40px; left: -60px;
            background: var(--text);
            color: var(--bg);
            padding: 30px;
            font-size: 0.6rem;
            letter-spacing: 4px;
            font-weight: 700;
            text-transform: uppercase;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        /* Collection Grid: Asymmetrical */
        .gallery {
            padding: 150px 10%;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 40px;
        }

        .item { position: relative; overflow: hidden; }
        .item img { width: 100%; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .item:hover img { transform: scale(1.05); filter: brightness(1.1); }

        .item-1 { grid-column: 1 / 8; }
        .item-2 { grid-column: 9 / 13; margin-top: 150px; }
        
        .item-details {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        /* Interactive Elements */
        .shop-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 15px 30px;
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 20px;
            transition: 0.4s;
        }
        .shop-btn:hover { background: white; color: black; border-color: white; }

        /* Reveal Animation */
        .reveal { opacity: 0; transform: translateY(50px); transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="bg-watermark" id="watermark">CHIC</div>

    <nav>
        <div class="logo">CHIC</div>
        <div class="nav-links">
            <a href="#">The Series</a>
            <a href="#">Journal</a>
            <a href="#">Archives (0)</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <p style="letter-spacing: 8px; font-size: 0.6rem; opacity: 0.4; margin-bottom: 20px;">L'ESSENCE DE LA FORME</p>
            <h1>Shatter<br><span style="margin-left: 15%; color: var(--accent);">Silence</span></h1>
            <p style="max-width: 300px; font-size: 0.8rem; font-weight: 100; opacity: 0.5; margin-top: 40px; line-height: 1.8;">
                A study in obsidian and silk. Exploring the boundary where shadow meets the human silhouette.
            </p>
        </div>
        <div class="hero-img-container">
            <img src="https://images.unsplash.com/photo-1539109132314-347f85417bd0?q=80&w=1974&auto=format&fit=crop" alt="High Fashion Editorial">
            <div class="floating-badge">Limited Release 2026</div>
        </div>
    </section>

    <section class="gallery">
        <div class="item item-1 reveal">
            <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1920&auto=format&fit=crop">
            <div class="item-details">
                <span>01. Drape Sculptor / Onyx</span>
                <span>$1,200</span>
            </div>
            <button class="shop-btn">Acquire Piece</button>
        </div>

        <div class="item item-2 reveal">
            <img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?q=80&w=1974&auto=format&fit=crop">
            <div class="item-details">
                <span>02. Silk Trestle</span>
                <span>$850</span>
            </div>
            <button class="shop-btn">Acquire Piece</button>
        </div>
    </section>

    <footer style="padding: 100px 10%; text-align: center; border-top: 1px solid rgba(255,255,255,0.05);">
        <div class="logo" style="opacity: 0.2; margin-bottom: 20px;">CHIC</div>
        <p style="font-size: 0.6rem; letter-spacing: 5px; opacity: 0.3;">ESTABLISHED IN THE VOID</p>
    </footer>

    <script>
        const watermark = document.getElementById('watermark');

        // Kinetic Watermark Scroll
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            
            // Text spreads as you scroll
            watermark.style.letterSpacing = (scrolled * 0.05 - 2) + 'vw';
            watermark.style.opacity = 0.02 + (scrolled * 0.00005);

            // Scroll Reveal Logic
            document.querySelectorAll('.reveal').forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight - 100) {
                    el.classList.add('active');
                }
            });
        });

        // Parallax Mouse Effect
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 20;
            const y = (e.clientY / window.innerHeight) * 20;
            watermark.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        });
    </script>
</body>
</html>
